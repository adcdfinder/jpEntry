name: Release Windows installer

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v1.0.4"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as prerelease"
        required: false
        default: false
        type: boolean

  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.release_tag || github.ref_name }}

jobs:
  build:
    name: Release Windows x64 installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.release_tag }}"
          if (-not $tag) {
            $tag = "${{ github.ref_name }}"
          }
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # 关键修改：禁止 electron-builder 自动发布
      - name: Build Windows package
        run: npx electron-builder --win --publish=never

      - name: Rename Windows installer
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG -replace '^v', ''
          $installer = Get-ChildItem "dist/*.exe" |
            Where-Object { $_.Name -match "Setup|NSIS" } |
            Select-Object -First 1

          if (-not $installer) {
            throw "Windows installer exe was not found."
          }

          $targetName = "JPEntry_${version}_x64-setup.exe"
          Rename-Item -Path $installer.FullName -NewName $targetName -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: jpentry-windows-installer
          path: dist/*.exe
          if-no-files-found: error

      - name: Publish to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease || false }}
        run: |
          $assets = Get-ChildItem "dist/*.exe" |
            Where-Object { $_.Name -match "Setup|NSIS" }

          if (-not $assets) {
            throw "No Windows installer exe found."
          }

          gh release view $env:RELEASE_TAG *> $null

          if ($LASTEXITCODE -ne 0) {
            $args = @(
              "release",
              "create",
              $env:RELEASE_TAG,
              "--target",
              "${{ github.sha }}",
              "--title",
              $env:RELEASE_TAG,
              "--notes",
              "Windows installer release."
            )

            if ($env:PRERELEASE -eq "true") {
              $args += "--prerelease"
            }

            gh @args
          }

          foreach ($asset in $assets) {
            gh release upload $env:RELEASE_TAG $asset.FullName --clobber
          }
