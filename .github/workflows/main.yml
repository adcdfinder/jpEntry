name: Release Windows installer

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v1.0.4"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as prerelease"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.release_tag || github.ref_name }}

jobs:
  build:
    name: Release Windows x64 installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Resolve release tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.release_tag }}"
          if (-not $tag) {
            $tag = "${{ github.ref_name }}"
          }
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows package
        run: npm run build

      - name: Rename Windows installer
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG -replace '^v', ''
          $distDir = "dist"
          $installers = Get-ChildItem "$distDir/*.exe" | Where-Object { $_.Name -match "Setup" -or $_.Name -match "NSIS" }
          
          if ($installers) {
            foreach ($installer in $installers) {
              $targetName = "JPEntry_${version}_x64-setup.exe"
              Rename-Item -Path $installer.FullName -NewName $targetName -Force
            }
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jpentry-windows-installer
          path: dist/*.exe
          if-no-files-found: warn

      - name: Publish to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ github.event.inputs.prerelease || false }}
        run: |
          $assets = Get-ChildItem "dist/*.exe"
          if (-not $assets) {
            Write-Warning "No Windows installer exe found in dist/"
            exit 0
          }

          $releaseExists = gh release view $env:RELEASE_TAG 2>$null
          if ($LASTEXITCODE -ne 0) {
            $args = @("release", "create", $env:RELEASE_TAG, "--target", "${{ github.sha }}", "--title", $env:RELEASE_TAG, "--notes", "Windows installer release.")
            if ($env:PRERELEASE -eq "true") {
              $args += "--prerelease"
            }
            gh @args
          }

          foreach ($asset in $assets) {
            gh release upload $env:RELEASE_TAG $asset.FullName --clobber
          }
