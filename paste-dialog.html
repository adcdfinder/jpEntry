<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Paste Text</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .card {
      background: #313244;
      border-radius: 16px;
      padding: 28px 28px 24px;
      width: 460px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .title {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .title-icon { font-size: 1.4rem; line-height: 1; }
    .title-text {
      font-size: 1.15rem;
      font-weight: 700;
      color: #cba6f7;
      letter-spacing: 0.02em;
    }
    textarea {
      width: 100%;
      height: 180px;
      background: #1e1e2e;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 10px;
      padding: 12px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.95rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #cba6f7; }
    .actions {
      display: flex;
      gap: 10px;
    }
    button {
      flex: 1;
      padding: 11px;
      border-radius: 10px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.98); }
    #applyBtn { background: #cba6f7; color: #1e1e2e; }
    #applyBtn:hover { background: #d4aaff; }
    #cancelBtn {
      background: transparent;
      color: #6c7086;
      border: 1px solid #45475a;
    }
    #cancelBtn:hover { color: #cdd6f4; border-color: #6c7086; }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">
      <span class="title-icon">📋</span>
      <span class="title-text">Paste Text</span>
    </div>
    <textarea id="textInput" placeholder="Type or paste your text here…" autofocus></textarea>
    <div class="actions">
      <button id="cancelBtn">Cancel</button>
      <button id="applyBtn">Apply</button>
    </div>
  </div>
  <script>
    const { ipcRenderer } = require('electron');

    document.getElementById('applyBtn').addEventListener('click', () => {
      const text = document.getElementById('textInput').value;
      ipcRenderer.send('paste-apply', text);
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      ipcRenderer.send('paste-cancel');
    });

    // Apply on Ctrl+Enter for convenience
    document.getElementById('textInput').addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') {
        const text = e.target.value;
        ipcRenderer.send('paste-apply', text);
      }
    });
  </script>
</body>
</html>
