<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Paste Text</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);   }
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F0F2F4;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .card {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 24px 24px 20px;
      width: 460px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.10);
      border: 1px solid rgba(0,0,0,0.06);
      animation: popIn 0.18s cubic-bezier(0.34, 1.3, 0.64, 1) both;
      display: flex;
      flex-direction: column;
      gap: 12px;
      color: #5C6773;
      -webkit-app-region: drag;
    }
    textarea, button {
      -webkit-app-region: no-drag;
    }
    .drag-handle {
      display: flex;
      justify-content: center;
      cursor: grab;
      opacity: 0.3;
      user-select: none;
      letter-spacing: 3px;
      font-size: 0.75rem;
    }
    .title {
      display: flex;
      align-items: center;
      gap: 9px;
      padding-bottom: 12px;
      border-bottom: 1px solid #F0F1F2;
    }
    .title-icon { font-size: 1.2rem; line-height: 1; }
    .title-text {
      font-size: 1rem;
      font-weight: 700;
      color: #399EE6;
      letter-spacing: 0.01em;
    }
    textarea {
      width: 100%;
      height: 155px;
      background: #F8F9FA;
      color: #5C6773;
      border: 1.5px solid #E0E1E2;
      border-radius: 10px;
      padding: 11px 13px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.93rem;
      resize: none;
      outline: none;
      transition: border-color 0.18s, background 0.18s;
    }
    textarea:focus {
      border-color: #399EE6;
      background: #FFFFFF;
    }
    .actions { display: flex; gap: 9px; }
    button {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    #applyBtn { background: #399EE6; color: #FFFFFF; }
    #applyBtn:hover { background: #55AAEE; }
    #cancelBtn {
      background: transparent;
      color: #B0B8C1;
      border: 1.5px solid #E8E9EA;
    }
    #cancelBtn:hover { background: #F5F6F7; color: #5C6773; border-color: #D0D1D2; }

    /* ── Progress view ── */
    #inputSection {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #progressSection {
      display: none;
      flex-direction: column;
      gap: 14px;
      padding: 8px 0 4px;
    }
    #progressSection.visible { display: flex; }
    .progress-label {
      font-size: 0.85rem;
      color: #8C95A0;
      text-align: center;
      letter-spacing: 0.01em;
    }
    .progress-track {
      width: 100%;
      height: 8px;
      background: #EEF0F2;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: #399EE6;
      border-radius: 99px;
      transition: width 0.12s ease;
    }
    #cancelTypingBtn {
      background: transparent;
      color: #B0B8C1;
      border: 1.5px solid #E8E9EA;
    }
    #cancelTypingBtn:hover { background: #F5F6F7; color: #5C6773; border-color: #D0D1D2; }
  </style>
</head>
<body>
  <div class="card">
    <div class="drag-handle">⠿ ⠿ ⠿</div>
    <div class="title">
      <span class="title-icon">📋</span>
      <span class="title-text">Paste Text</span>
    </div>
    <div id="inputSection">
      <textarea id="textInput" placeholder="Type or paste your text here…" autofocus></textarea>
      <div class="actions">
        <button id="cancelBtn">Cancel</button>
        <button id="applyBtn">Apply</button>
      </div>
    </div>

    <div id="progressSection">
      <div id="progressLabel" class="progress-label">Typing… 0 / 0</div>
      <div class="progress-track">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <button id="cancelTypingBtn">Cancel</button>
    </div>
  </div>
  <script>
    const { ipcRenderer } = require('electron');

    let totalChars = 0;

    function startProgress(total) {
      totalChars = total;
      document.getElementById('inputSection').style.display = 'none';
      document.getElementById('progressSection').classList.add('visible');
      updateProgress(0, total);
    }

    function updateProgress(current, total) {
      const pct = total > 0 ? Math.round((current / total) * 100) : 100;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressLabel').textContent =
        `Typing… ${current} / ${total}`;
    }

    function applyText() {
      const text = document.getElementById('textInput').value;
      if (!text) return;
      totalChars = Array.from(text).length;
      ipcRenderer.send('paste-apply', text);
      startProgress(totalChars);
    }

    document.getElementById('applyBtn').addEventListener('click', applyText);

    document.getElementById('cancelBtn').addEventListener('click', () => {
      ipcRenderer.send('paste-cancel');
    });

    document.getElementById('cancelTypingBtn').addEventListener('click', () => {
      ipcRenderer.send('paste-cancel-operation');
    });

    document.getElementById('textInput').addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') applyText();
    });

    ipcRenderer.on('paste-progress', (_e, { current, total }) => {
      updateProgress(current, total);
    });
  </script>
</body>
</html>
