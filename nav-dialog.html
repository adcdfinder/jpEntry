<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Navigation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);   }
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F0F2F4;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }
    .card {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 24px 22px 20px;
      width: 340px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.10);
      border: 1px solid rgba(0,0,0,0.06);
      animation: popIn 0.18s cubic-bezier(0.34, 1.3, 0.64, 1) both;
      color: #5C6773;
    }
    .title {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid #F0F1F2;
    }
    .title-text {
      font-size: 1rem;
      font-weight: 700;
      color: #399EE6;
      letter-spacing: 0.01em;
    }
    .nav-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 8px;
    }
    .divider {
      border: none;
      border-top: 1px solid #F0F1F2;
      margin: 10px 0;
    }
    button {
      display: flex;
      align-items: center;
      gap: 11px;
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      color: #5C6773;
    }
    button:active { transform: scale(0.97); }

    #rootBtn  { background: #399EE6; color: #FFFFFF; }
    #rootBtn:hover  { background: #55AAEE; }

    #backBtn  { background: #F5F6F7; }
    #backBtn:hover  { background: #EAEBEC; }

    #pasteBtn { background: #F5F6F7; }
    #pasteBtn:hover { background: #EAEBEC; }

    #iframeBtn { background: #F5F6F7; }
    #iframeBtn:hover { background: #EAEBEC; }

    #clearAllCredentialsBtn {
      background: #F5F6F7;
    }
    #clearAllCredentialsBtn:hover {
      background: #EAEBEC;
    }

    #quitBtn  {
      background: #FFF3F3;
      color: #E05858;
      border: 1px solid rgba(224, 88, 88, 0.18);
    }
    #quitBtn:hover  { background: #FFE8E8; }

    #cancelBtn {
      display: block;
      width: 100%;
      padding: 10px;
      background: transparent;
      color: #B0B8C1;
      border: 1.5px solid #E8E9EA;
      border-radius: 10px;
      font-size: 0.87rem;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    #cancelBtn:hover { background: #F5F6F7; color: #5C6773; border-color: #D0D1D2; }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">
      <span class="title-text">Kiosk Navigation</span>
    </div>
    <div class="nav-group">
      <button id="rootBtn">Go to Root Page</button>
      <button id="backBtn">Go to Last Page</button>
      <button id="pasteBtn">Paste Text</button>
      <button id="iframeBtn">Detect Iframes</button>
    </div>
    <hr class="divider" />
    <div class="nav-group">
      <button id="clearAllCredentialsBtn">Clear All Passwords</button>
    </div>
    <hr class="divider" />
    <div class="nav-group">
      <button id="quitBtn">Close Application</button>
    </div>
    <button id="cancelBtn">Cancel</button>
  </div>
  <script>
    const { ipcRenderer } = require('electron');

    function bindAction(id, action) {
      const element = document.getElementById(id);
      if (!element) return;
      element.addEventListener('click', () => ipcRenderer.send('nav-action', action));
    }

    bindAction('rootBtn', 'root');
    bindAction('backBtn', 'back');
    bindAction('pasteBtn', 'paste');
    bindAction('iframeBtn', 'check-iframes');
    bindAction('clearAllCredentialsBtn', 'clear-all-credentials');
    bindAction('quitBtn', 'quit');
    bindAction('cancelBtn', 'cancel');
  </script>
</body>
</html>
