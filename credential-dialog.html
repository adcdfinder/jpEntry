<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Save Password</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #F0F2F4;
      color: #5C6773;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      user-select: none;
    }

    .card {
      width: 460px;
      background: #FFFFFF;
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.10);
      padding: 24px 24px 20px;
      animation: popIn 0.18s cubic-bezier(0.34, 1.3, 0.64, 1) both;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .title {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding-bottom: 12px;
      border-bottom: 1px solid #F0F1F2;
    }

    h1 {
      font-size: 1rem;
      color: #399EE6;
      font-weight: 700;
    }

    .subtitle {
      color: #7C8793;
      font-size: 0.82rem;
      line-height: 1.35;
    }

    .fields {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field {
      background: #F8F9FA;
      border: 1px solid #E8E9EA;
      border-radius: 8px;
      padding: 10px 11px;
    }

    .label {
      display: block;
      color: #8A949F;
      font-size: 0.72rem;
      margin-bottom: 3px;
    }

    .value {
      display: block;
      color: #46515C;
      font-size: 0.9rem;
      font-weight: 650;
      word-break: break-all;
    }

    .secret {
      color: #24313D;
      font-family: Consolas, 'SFMono-Regular', monospace;
      letter-spacing: 0.02em;
    }

    .secret-input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: #24313D;
      font-family: Consolas, 'SFMono-Regular', monospace;
      font-size: 0.9rem;
      font-weight: 650;
      letter-spacing: 0.02em;
      user-select: text;
    }

    .secret-input::placeholder { color: #A8B0B8; }

    .status {
      min-height: 1.1em;
      color: #D85050;
      font-size: 0.78rem;
    }

    .actions {
      display: flex;
      gap: 9px;
    }

    button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: 650;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
    }

    button:active { transform: scale(0.98); }

    #saveBtn { background: #399EE6; color: #FFFFFF; }
    #saveBtn:hover { background: #55AAEE; }

    #skipBtn {
      background: transparent;
      color: #7C8793;
      border: 1.5px solid #E1E4E8;
    }

    #skipBtn:hover { background: #F5F6F7; color: #4D5965; border-color: #D0D5DA; }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">
      <h1 id="title">Save login security?</h1>
      <div id="subtitle" class="subtitle">JP Entry can fill this login and generate OTP codes for this site.</div>
    </div>

    <div class="fields">
      <div class="field">
        <span class="label">Site</span>
        <span id="origin" class="value"></span>
      </div>
      <div class="field">
        <span class="label">Username</span>
        <span id="username" class="value"></span>
      </div>
      <div class="field">
        <span class="label">MFA Secret</span>
        <input
          id="mfaSecret"
          class="secret-input"
          autocomplete="off"
          spellcheck="false"
          placeholder="Paste MFA secret"
        />
      </div>
    </div>

    <div id="status" class="status"></div>

    <div class="actions">
      <button id="skipBtn">Not Now</button>
      <button id="saveBtn">Save Login</button>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const title = document.getElementById('title');
    const subtitle = document.getElementById('subtitle');
    const origin = document.getElementById('origin');
    const username = document.getElementById('username');
    const mfaSecret = document.getElementById('mfaSecret');
    const status = document.getElementById('status');
    const saveBtn = document.getElementById('saveBtn');
    const skipBtn = document.getElementById('skipBtn');

    ipcRenderer.on('credential-prompt', (_event, payload) => {
      const isUpdate = payload && payload.mode === 'update';
      const isMfa = payload && payload.mode === 'mfa';
      title.textContent = isUpdate
        ? 'Update saved password?'
        : isMfa
          ? 'Add MFA secret?'
          : 'Save login security?';
      subtitle.textContent = isUpdate
        ? 'The saved password for this site is different.'
        : isMfa
          ? 'JP Entry can generate the 6-digit OTP code for this site.'
          : 'JP Entry can fill this login and generate OTP codes for this site.';
      saveBtn.textContent = isUpdate
        ? 'Update Password'
        : isMfa
          ? 'Save MFA'
          : 'Save Login';
      origin.textContent = payload && payload.origin ? payload.origin : '(unknown site)';
      username.textContent = payload && payload.username ? payload.username : '(blank)';
      mfaSecret.value = payload && payload.mfaSecret ? payload.mfaSecret : '';
      status.textContent = '';
    });

    ipcRenderer.on('credential-error', (_event, payload) => {
      status.textContent = payload && payload.message
        ? payload.message
        : 'Unable to save password.';
      saveBtn.disabled = false;
      skipBtn.disabled = false;
    });

    saveBtn.addEventListener('click', () => {
      const secret = mfaSecret.value.trim();
      if (!secret) {
        status.textContent = 'Enter the MFA secret before saving.';
        mfaSecret.focus();
        return;
      }
      saveBtn.disabled = true;
      skipBtn.disabled = true;
      ipcRenderer.send('credential-mfa-secret-changed', secret);
      ipcRenderer.send('credential-action', 'save');
    });

    mfaSecret.addEventListener('input', () => {
      status.textContent = '';
      ipcRenderer.send('credential-mfa-secret-changed', mfaSecret.value);
    });

    skipBtn.addEventListener('click', () => {
      ipcRenderer.send('credential-action', 'skip');
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        ipcRenderer.send('credential-action', 'skip');
      }
      if (event.key === 'Enter') {
        if (event.target === mfaSecret) return;
        ipcRenderer.send('credential-action', 'save');
      }
    });
  </script>
</body>
</html>
