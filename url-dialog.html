<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Enter URL</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);   }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F0F2F4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .card {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 28px 28px 24px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.10);
      border: 1px solid rgba(0,0,0,0.06);
      animation: popIn 0.18s cubic-bezier(0.34, 1.3, 0.64, 1) both;
      color: #5C6773;
      -webkit-app-region: drag;
    }
    input, button, select, #error, .zone-toggle, .resolution-panel {
      -webkit-app-region: no-drag;
    }
    .drag-handle {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
      cursor: grab;
      opacity: 0.3;
      user-select: none;
      letter-spacing: 3px;
      font-size: 0.75rem;
    }
    h2 {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: #399EE6;
      letter-spacing: 0.01em;
    }
    input,
    select {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1.5px solid #E0E1E2;
      background: #F8F9FA;
      color: #5C6773;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.18s, background 0.18s;
    }
    input:focus,
    select:focus {
      border-color: #399EE6;
      background: #FFFFFF;
    }
    .resolution-panel {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid #E8E9EA;
      border-radius: 10px;
      background: #FAFBFC;
    }
    .field-label {
      display: block;
      margin-bottom: 7px;
      font-size: 0.78rem;
      font-weight: 700;
      color: #7A8591;
    }
    .custom-resolution {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .custom-resolution[hidden] {
      display: none;
    }
    .zone-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .zone-toggle button {
      margin-top: 0;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1.5px solid #E0E1E2;
      background: #F8F9FA;
      color: #687480;
      font-size: 0.88rem;
      font-weight: 700;
    }
    .zone-toggle button.active {
      color: #FFFFFF;
      border-color: transparent;
    }
    .zone-toggle button.zone-red.active {
      background: #D75A4A;
    }
    .zone-toggle button.zone-yellow.active {
      background: #D3A420;
    }
    button {
      margin-top: 14px;
      width: 100%;
      padding: 11px;
      border-radius: 10px;
      border: none;
      background: #399EE6;
      color: #FFFFFF;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
    }
    button:hover  { background: #55AAEE; }
    button:active { transform: scale(0.97); }
    #error {
      margin-top: 8px;
      font-size: 0.82rem;
      color: #E05858;
      min-height: 1.1em;
    }
    .checkbox-row {
      -webkit-app-region: no-drag;
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.88rem;
      color: #5C6773;
    }
    .checkbox-row input[type="checkbox"] {
      -webkit-app-region: no-drag;
      width: 16px;
      height: 16px;
      accent-color: #399EE6;
      cursor: pointer;
    }
    .checkbox-row label {
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="drag-handle">...</div>
    <h2>Enter Kiosk URL</h2>
    <div id="zoneToggle" class="zone-toggle"></div>
    <input type="text" id="urlInput" placeholder="https://example.com" autofocus />
    <div id="error"></div>
    <div class="resolution-panel">
      <label class="field-label" for="resolutionMode">Remote resolution</label>
      <select id="resolutionMode"></select>
      <div id="customResolution" class="custom-resolution" hidden>
        <input type="number" id="resolutionWidth" min="640" max="7680" step="1" />
        <input type="number" id="resolutionHeight" min="480" max="4320" step="1" />
      </div>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="fullscreenCheck" checked />
      <label for="fullscreenCheck">Enter full screen mode</label>
    </div>
    <button id="okBtn">OK - Enter Kiosk Mode</button>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    const {
      DEFAULT_RESOLUTION_SETTING,
      PRESET_RESOLUTIONS,
      RESOLUTION_STORAGE_KEY,
      normalizeResolutionSetting,
    } = require('./resolution-settings');
    const urlInput = document.getElementById('urlInput');
    const zoneToggle = document.getElementById('zoneToggle');
    const resolutionMode = document.getElementById('resolutionMode');
    const customResolution = document.getElementById('customResolution');
    const resolutionWidth = document.getElementById('resolutionWidth');
    const resolutionHeight = document.getElementById('resolutionHeight');
    let kioskZones = [];
    let selectedZone = '';
    let resolutionOptions = {
      presets: PRESET_RESOLUTIONS,
      setting: DEFAULT_RESOLUTION_SETTING,
      displayBounds: null,
      limits: {
        minWidth: 640,
        minHeight: 480,
        maxWidth: 7680,
        maxHeight: 4320,
      },
    };

    function storedResolutionSetting() {
      try {
        const raw = localStorage.getItem(RESOLUTION_STORAGE_KEY);
        return raw ? normalizeResolutionSetting(JSON.parse(raw)) : null;
      } catch (_err) {
        return null;
      }
    }

    function saveResolutionSetting(setting) {
      try {
        localStorage.setItem(RESOLUTION_STORAGE_KEY, JSON.stringify(setting));
      } catch (_err) {}
    }

    function optionValueForSetting(setting) {
      const normalized = normalizeResolutionSetting(setting);
      if (normalized.mode === 'auto' || normalized.mode === 'display') {
        return normalized.mode;
      }
      if (normalized.mode === 'preset') {
        return `preset:${normalized.width}x${normalized.height}`;
      }
      return 'custom';
    }

    function addResolutionOption(value, label) {
      const option = document.createElement('option');
      option.value = value;
      option.textContent = label;
      resolutionMode.appendChild(option);
    }

    function renderResolutionOptions(payload) {
      resolutionOptions = Object.assign({}, resolutionOptions, payload || {});
      const presets = Array.isArray(resolutionOptions.presets)
        ? resolutionOptions.presets
        : PRESET_RESOLUTIONS;
      const display = resolutionOptions.displayBounds || {};
      const displayLabel = display.width && display.height
        ? `Display size (${display.width}x${display.height})`
        : 'Display size';
      const setting = storedResolutionSetting() ||
        normalizeResolutionSetting(resolutionOptions.setting);

      resolutionMode.innerHTML = '';
      addResolutionOption('auto', 'Auto');
      addResolutionOption('display', displayLabel);
      presets.forEach((preset) => {
        addResolutionOption(`preset:${preset.width}x${preset.height}`, preset.label);
      });
      addResolutionOption('custom', 'Custom');

      resolutionMode.value = optionValueForSetting(setting);
      if (setting.width && setting.height) {
        resolutionWidth.value = String(setting.width);
        resolutionHeight.value = String(setting.height);
      } else {
        resolutionWidth.value = '1920';
        resolutionHeight.value = '1080';
      }
      updateResolutionInputs();
    }

    function updateResolutionInputs() {
      const isCustom = resolutionMode.value === 'custom';
      customResolution.hidden = !isCustom;
    }

    function currentResolutionSetting() {
      const value = resolutionMode.value;
      if (value === 'auto' || value === 'display') {
        return { mode: value, width: 0, height: 0 };
      }
      if (value.startsWith('preset:')) {
        const parts = value.slice('preset:'.length).split('x');
        return normalizeResolutionSetting({
          mode: 'preset',
          width: parts[0],
          height: parts[1],
        });
      }
      return normalizeResolutionSetting({
        mode: 'custom',
        width: resolutionWidth.value,
        height: resolutionHeight.value,
      });
    }

    function selectZone(zoneKey) {
      const zone = kioskZones.find((item) => item.key === zoneKey);
      if (!zone) return;

      selectedZone = zone.key;
      urlInput.value = zone.url;
      Array.from(zoneToggle.querySelectorAll('button')).forEach((button) => {
        button.classList.toggle('active', button.dataset.zone === zone.key);
      });
      urlInput.focus();
      urlInput.select();
    }

    function renderZones(payload) {
      kioskZones = Array.isArray(payload && payload.zones) ? payload.zones : [];
      selectedZone = payload && payload.defaultZone ? payload.defaultZone : '';
      zoneToggle.innerHTML = '';

      kioskZones.forEach((zone) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.dataset.zone = zone.key;
        button.className = 'zone-' + zone.key;
        button.textContent = zone.label;
        button.addEventListener('click', () => selectZone(zone.key));
        zoneToggle.appendChild(button);
      });

      selectZone(selectedZone || (kioskZones[0] && kioskZones[0].key));
    }

    function submit() {
      const raw = urlInput.value.trim();
      const err = document.getElementById('error');
      if (!raw) { err.textContent = 'Please enter a URL.'; return; }
      let url = raw;
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
      err.textContent = '';
      const fullscreen = document.getElementById('fullscreenCheck').checked;
      const resolution = currentResolutionSetting();
      saveResolutionSetting(resolution);
      ipcRenderer.send('url-submitted', { url, fullscreen, zone: selectedZone, resolution });
    }

    renderResolutionOptions({});

    ipcRenderer.on('kiosk-zones', (_event, payload) => renderZones(payload));
    ipcRenderer.on('resolution-options', (_event, payload) => renderResolutionOptions(payload));
    resolutionMode.addEventListener('change', updateResolutionInputs);
    document.getElementById('okBtn').addEventListener('click', submit);
    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submit();
    });
  </script>
</body>
</html>
