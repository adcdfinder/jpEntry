<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Enter URL</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);   }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F0F2F4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .card {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 28px 28px 24px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.10);
      border: 1px solid rgba(0,0,0,0.06);
      animation: popIn 0.18s cubic-bezier(0.34, 1.3, 0.64, 1) both;
      color: #5C6773;
      -webkit-app-region: drag;
    }
    input, button, #error {
      -webkit-app-region: no-drag;
    }
    .drag-handle {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
      cursor: grab;
      opacity: 0.3;
      user-select: none;
      letter-spacing: 3px;
      font-size: 0.75rem;
    }
    h2 {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: #399EE6;
      letter-spacing: 0.01em;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1.5px solid #E0E1E2;
      background: #F8F9FA;
      color: #5C6773;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.18s, background 0.18s;
    }
    input:focus {
      border-color: #399EE6;
      background: #FFFFFF;
    }
    button {
      margin-top: 14px;
      width: 100%;
      padding: 11px;
      border-radius: 10px;
      border: none;
      background: #399EE6;
      color: #FFFFFF;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
    }
    button:hover  { background: #55AAEE; }
    button:active { transform: scale(0.97); }
    #error {
      margin-top: 8px;
      font-size: 0.82rem;
      color: #E05858;
      min-height: 1.1em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="drag-handle">⠿ ⠿ ⠿</div>
    <h2>🖥 Enter Kiosk URL</h2>
    <input type="text" id="urlInput" placeholder="https://example.com" value="http://192.168.88.250:8080" autofocus />
    <div id="error"></div>
    <button id="okBtn">OK — Enter Kiosk Mode</button>
  </div>
  <script>
    const { ipcRenderer } = require('electron');

    function submit() {
      const raw = document.getElementById('urlInput').value.trim();
      const err = document.getElementById('error');
      if (!raw) { err.textContent = 'Please enter a URL.'; return; }
      let url = raw;
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
      err.textContent = '';
      ipcRenderer.send('url-submitted', url);
    }

    document.getElementById('okBtn').addEventListener('click', submit);
    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') submit();
    });
  </script>
</body>
</html>
