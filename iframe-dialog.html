<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Iframe Detected</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);   }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F0F2F4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .card {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 24px 24px 20px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.10);
      border: 1px solid rgba(0,0,0,0.06);
      animation: popIn 0.18s cubic-bezier(0.34, 1.3, 0.64, 1) both;
      color: #5C6773;
      -webkit-app-region: drag;
    }
    button {
      -webkit-app-region: no-drag;
    }
    .drag-handle {
      display: flex;
      justify-content: center;
      margin-bottom: 6px;
      cursor: grab;
      opacity: 0.3;
      user-select: none;
      letter-spacing: 3px;
      font-size: 0.75rem;
    }
    h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 10px;
      color: #399EE6;
      letter-spacing: 0.01em;
    }
    .url {
      background: #EFF6FF;
      border: 1px solid #BEE0FF;
      border-radius: 8px;
      padding: 8px 11px;
      font-size: 0.78rem;
      color: #399EE6;
      word-break: break-all;
      margin-bottom: 12px;
      font-family: 'Consolas', 'SF Mono', monospace;
    }
    p { font-size: 0.88rem; color: #8A9199; margin-bottom: 16px; }
    .buttons { display: flex; gap: 9px; }
    button {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    #goBtn   { background: #399EE6; color: #FFFFFF; }
    #goBtn:hover   { background: #55AAEE; }
    #stayBtn { background: #F5F6F7; color: #5C6773; }
    #stayBtn:hover { background: #EAEBEC; }
  </style>
</head>
<body>
  <div class="card">
    <div class="drag-handle">⠿ ⠿ ⠿</div>
    <h2>📦 Embedded Frame Detected</h2>
    <div class="url" id="iframeUrl">—</div>
    <p>Navigate to this URL in the main window?</p>
    <div class="buttons">
      <button id="goBtn">✅ Navigate</button>
      <button id="stayBtn">✖ Stay Here</button>
    </div>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    ipcRenderer.on('iframe-url', (_, url) => {
      document.getElementById('iframeUrl').textContent = url;
    });
    document.getElementById('goBtn').addEventListener('click', () => ipcRenderer.send('iframe-action', 'navigate'));
    document.getElementById('stayBtn').addEventListener('click', () => ipcRenderer.send('iframe-action', 'stay'));
  </script>
</body>
</html>
